name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install and build
        run: |
          npm ci
          npm run build
      - name: Prepare static site for GitHub Pages
        run: |
          cp dist/jutsu-companion/browser/index.html dist/jutsu-companion/browser/404.html
          : > dist/jutsu-companion/browser/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/jutsu-companion/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
