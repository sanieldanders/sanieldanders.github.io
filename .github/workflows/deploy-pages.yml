# Publishes the Angular production build to GitHub Pages (static artifact).
#
# Repository Settings → Pages → Build and deployment → Source must be
# "GitHub Actions". If Source is set to "Deploy from a branch" on main with
# / (root), the site will 404 because this repo has no index.html at the root
# (only under dist/ after CI builds).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install and build
        run: |
          npm ci
          npm run build
      - name: Resolve Pages output directory
        id: pages_out
        shell: bash
        run: |
          if [[ -f dist/jutsu-companion/browser/index.html ]]; then
            echo "dir=dist/jutsu-companion/browser" >> "$GITHUB_OUTPUT"
          elif [[ -f dist/jutsu-companion/index.html ]]; then
            echo "dir=dist/jutsu-companion" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Build output missing index.html (expected under dist/jutsu-companion/browser for this Angular version)."
            find dist -maxdepth 5 -type f -name index.html 2>/dev/null || true
            ls -la dist 2>/dev/null || true
            exit 1
          fi
      - name: Prepare SPA fallback for GitHub Pages
        shell: bash
        run: |
          OUT="${{ steps.pages_out.outputs.dir }}"
          cp "$OUT/index.html" "$OUT/404.html"
          : > "$OUT/.nojekyll"
          ls -la "$OUT" | head -n 30
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.pages_out.outputs.dir }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
